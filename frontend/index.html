<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多平台推广文章生成器</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>多平台推广文章生成器</h1>

    <!-- 生成控制 -->
    <section class="card control-panel">
      <div class="row">
        <div class="field">
          <label>平台</label>
          <select id="platform">
            {% for p in platforms %}
            <option value="{{ p.key }}">{{ p.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field">
          <label>生成篇数</label>
          <input id="count" type="number" value="3" min="1" max="20">
        </div>
        <div class="field">
          <label>模板（可选）</label>
          <select id="template-select">
            <option value="">不使用模板</option>
          </select>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button id="btn-generate" onclick="startGenerate()">一键生成</button>
          <button id="btn-download" class="hidden" onclick="downloadResult()">下载结果</button>
        </div>
      </div>
      <div id="gen-status" class="status-bar hidden"></div>
    </section>

    <!-- 关键词选择 -->
    <section class="card keyword-selector">
      <div class="section-header">
        <h3>关键词选择</h3>
        <div class="actions">
          <button class="btn-sm" onclick="selectAll()">全选</button>
          <button class="btn-sm" onclick="deselectAll()">全不选</button>
        </div>
      </div>
      <div id="keyword-groups"></div>
    </section>

    <!-- 配置编辑器 -->
    <section class="card config-editor">
      <div class="section-header">
        <h3>配置编辑</h3>
        <div class="actions">
          <button id="btn-save" onclick="saveConfig()">保存</button>
          <button id="btn-reload" onclick="loadConfig()">重新加载</button>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="diversity">多样性</button>
        <button class="tab" data-tab="zhihu">知乎</button>
        <button class="tab" data-tab="xiaohongshu">小红书</button>
        <button class="tab" data-tab="x">X</button>
        <button class="tab" data-tab="bilibili">Bilibili</button>
      </div>
      <textarea id="config-textarea" class="config-area" spellcheck="false"></textarea>
      <div id="config-status" class="mini-status hidden"></div>
    </section>

    <!-- 历史输出 -->
    <section class="card output-history">
      <div class="section-header">
        <h3>历史输出</h3>
        <button id="btn-refresh-outputs" onclick="loadOutputs()">刷新</button>
      </div>
      <div id="output-list" class="output-list">暂无输出</div>
    </section>

    <!-- 日志 -->
    <section class="card log-viewer">
      <div class="section-header">
        <h3>生成日志</h3>
        <button id="btn-refresh-logs" onclick="loadLogs()">刷新</button>
      </div>
      <div id="log-list" class="log-list">暂无日志</div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
