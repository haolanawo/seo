# 小红书平台配置
name: "小红书"
style_prompt: |
  这是发布在小红书上的笔记，请注意以下风格要求：
  - 小红书用户偏爱轻松、亲切、口语化的表达，像朋友之间的分享。
  - 善用emoji增加趣味性和可读性。
  - 开篇要有吸引力，前两句话就要抓住读者注意力。
  - 内容要实用、可操作，读者看完能立刻用上。
  - 适当使用小红书常用的语气词（真的、绝了、谁懂啊、姐妹们等）。
  - 文末可以设置互动引导（问读者问题、请他们分享经验等）。
  - 添加合适的话题标签。
  - 文章长度建议300-800字，短小精悍。

emphasis: |
  【特别强调】请严格遵守以下小红书内容规范：
  - 禁止使用以下绝对化用语：第一、最好、绝对、100%、全网、唯一、最强、顶级、没有之一、完爆
  - 禁止使用医疗功效类描述
  - 禁止使用虚假夸大宣传
  - 如果是产品推荐，必须真实、客观，不吹不黑
  - 不要使用硬广口吻，要像真实的个人分享
