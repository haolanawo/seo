# X (Twitter) 平台配置
name: "X"
style_prompt: |
  这是发布在 X (Twitter) 上的内容，请注意以下风格要求：
  - X 是一个快节奏的社交平台，内容需要简洁有力。
  - 用英文或中英混合均可，但如果是英文内容要注意native表达。
  - Thread（推文串）格式：第一条推文抓住注意力，后续推文展开细节。
  - 每条推文不超过280字符（中文约140字），Thread中每条推文也应该独立有料。
  - 善用bullet points、数字列表增强可读性。
  - 语气可以更直接、有个性，敢于表达观点。
  - 适当使用hashtag增加曝光。
  - 整体Thread建议5-15条推文。

emphasis: ""
