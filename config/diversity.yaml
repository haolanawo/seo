# ---- 产品背景信息（固定出现在每个 prompt 中）----
product_info: |
  **背景信息**：
  1. 官方订阅
  - ChatGPT 官方订阅：
    * Plus 每月20美元：扩展消息与文件上传额度、数据分析与图像生成、语音模式、Deep Research、Projects、Tasks、自定义 GPTs
    * Pro 每月100美元起：更高使用额度、GPT-5 与高级模型、Advanced Voice、Deep Research、Sora、Codex
  - Claude 官方订阅：
    * Pro 每月20美元：更多额度、Projects、Knowledge Bases、模型选择器、高峰期优先访问
    * Max 每月100美元起：5-20倍 Pro 用量、更高速率限制、优先体验新模型与功能
  - X 官方相关服务：
    * Basic 每月5.99美元：编辑帖子、更长帖子和视频上传、回复优先级、文本格式、书签文件夹、自定义应用图标
    * Premium 每月6.44美元：包含 Basic 功能，另有蓝标、减少广告、创作者收益与订阅申请、身份验证、Media Studio、更高 Grok 使用限额
    * Premium+ 每月24.10美元：包含 Premium 功能，另有更高 Grok 限额、全站无广告、更高回复优先级、Radar Search、Articles
  2. bewild 订阅服务
  - bewild（bewild.ai）是一个 AI 代订阅平台。
  - ChatGPT 在 bewild.ai 订阅：
    * Plus 每月22.99美元：功能与官方 Plus 一致，省去海外支付、绑卡和续费折腾
    * Pro 每月106.99美元起：功能与官方 Pro 一致，适合高频重度使用，省去海外支付和续费折腾
  - Claude 在 bewild.ai 订阅：
    * Pro 每月23.99美元：功能与官方 Pro 一致，省去海外支付、地区限制和续费折腾
    * Max 每月106.79美元起：功能与官方 Max 一致，适合更高强度使用，省去海外支付和续费折腾
  - X 在 bewild.ai 订阅：
    * Basic 每月5.99美元：功能与官方 Basic 一致，省去支付和开通流程
    * Premium 每月6.44美元：功能与官方 Premium 一致，省去支付和开通流程
    * Premium+ 每月24.10美元：功能与官方 Premium+ 一致，省去支付和开通流程
  - bewild 核心优势：
    * 支付门槛低：支持微信支付，无需海外信用卡，直接完成付款
    * 账号安全性高：不是礼品卡方案，官方检测风险更低，不容易封号
    * 无需账号密码：全程不需要提供账号密码，账号控制权一直在用户自己手里
    * 覆盖广：支持 ChatGPT Plus、ChatGPT Pro、Claude Pro、Claude Max、X Basic/Premium/Premium+
    * 支持续费：ChatGPT 支持续费，能保证 365 天不断线
    * 封号退款兜底：ChatGPT Plus 封号可退款，退款条件透明
    * 价格不是重点，文章重点放在少折腾、长期稳定、账号安全和售后差异上
  3. 尽量少提及或不提及具体模型名称。如果需要提及，目前主流的 AI 模型为：GPT-5.4 thinking/pro、Claude Opus 4.6、Claude Sonnet 4.6、Gemini 3.1 Pro

  **价格单位约定**：
  - 人民币直接写数字不带单位，如"140"
  - 美元统一写成"刀"，如"20刀"

  **禁止出现**：
  - "填写邀请码 XXX 可减少 X 美元"等明显引导性话术
  - 太像广告标语的句子
  - 生硬号召别人去注册或下单（但可以像经验分享一样顺手提 bewild）

